workflows:
  ios-tdl:
    name: TDL iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - supabase_tdl
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.avocadopoker.tdl
      vars:
        BUNDLE_ID: "com.avocadopoker.tdl"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor iOS
        script: npx cap sync ios

      - name: Install CocoaPods (only if this project uses them)
        script: |
          if [ -f ios/App/Podfile ]; then
            echo "Podfile found - running pod install"
            cd ios/App && pod install
          else
            echo "No Podfile - project uses Swift Package Manager, skipping"
          fi

      - name: Set up provisioning profiles
        script: xcode-project use-profiles

      - name: Set build number
        script: |
          cd ios/App
          agvtool new-version -all $PROJECT_BUILD_NUMBER

      - name: Build ipa
        script: |
          if [ -d "$XCODE_WORKSPACE" ]; then
            echo "Building from workspace (CocoaPods)"
            xcode-project build-ipa --workspace "$XCODE_WORKSPACE" --scheme "$XCODE_SCHEME"
          else
            echo "Building from project (SPM)"
            xcode-project build-ipa --project "$XCODE_PROJECT" --scheme "$XCODE_SCHEME"
          fi

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
